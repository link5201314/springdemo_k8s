apiVersion: apps/v1
kind: Deployment
metadata:
  name: sbdemo-nginx
  namespace: todoweb
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sbdemo-nginx
  template:
    metadata:
      labels:
        app: sbdemo-nginx
    spec:
      containers:
      - name: nginx
#        image: nginx:latest
        image: docker.io/isaac0815/nginx:1.25.3
        imagePullPolicy: IfNotPresent 
        ports:
        - containerPort: 80
#        command: [ "/bin/bash" ]
        readinessProbe:
          httpGet:
            path: /healthz
            port: 80
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: server-conf
          mountPath: /etc/nginx/conf.d/server.conf
          subPath: server.conf
      volumes:
      - name: nginx-conf
        configMap: 
          name: nginx-conf
          items:
            - key: nginx.conf
              path: nginx.conf
      - name: server-conf
        configMap: 
          name: server-conf
          items:
            - key: server.conf
              path: server.conf
